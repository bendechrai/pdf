server {
  listen ${PORT};
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Make sure ES module workers (pdf.worker.min.mjs) get the right MIME type.
  types {
    text/html               html htm;
    text/css                css;
    text/javascript         js mjs;
    application/json        json;
    image/svg+xml           svg svgz;
    image/png               png;
    image/jpeg              jpg jpeg;
    image/x-icon            ico;
    font/woff               woff;
    font/woff2              woff2;
    application/pdf         pdf;
  }
  default_type application/octet-stream;

  # Long-cache hashed Vite assets.
  location /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # The pdf.js worker is content-addressed only by file name; revalidate but
  # let the browser keep it across navigations.
  location = /pdf.worker.min.mjs {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # Single-page app fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Tiny health endpoint for platform probes.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }
}
